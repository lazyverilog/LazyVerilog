name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build and publish, for example v1.2.6"
        required: true
        type: string
      dry_run:
        description: "Build and validate artifacts without committing, tagging, or publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: ubuntu-22.04-arm
            platform: linux-arm64
          - os: ubuntu-22.04
            platform: linux-x64-static
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          - os: ubuntu-22.04-arm
            platform: linux-arm64-static
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          - os: macos-15
            platform: darwin-x64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - os: macos-15
            platform: darwin-arm64
            cmake_extra: ""
          - os: windows-2022
            platform: windows-x64
            # Use MSVC through Ninja instead of the Visual Studio generator.
            # LspCpp's vendored CMake has a Visual-Studio-generator-only NuGet
            # Boost .targets path that is brittle on hosted runners; Ninja keeps
            # the compiler toolchain the same while avoiding that dependency.
            cmake_extra: -G Ninja -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
            executable_suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Validate version
        shell: bash
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: ${{ inputs.version }}" >&2
            exit 1
          fi

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        shell: bash
        run: |
          # Build the full default target so release CI still verifies every
          # configured binary/test helper, but keep parallelism modest because
          # slang's generated translation units are large in optimized builds
          # and can exceed memory on smaller hosted runners.
          cmake --build build --config Release --parallel 2

      - name: Strip and rename artifact
        shell: bash
        run: |
          # Keep the published asset names predictable while still handling both
          # single-config generators (Linux/macOS: build/lazyverilog-lsp) and
          # multi-config generators (Windows/MSVC: build/Release/lazyverilog-lsp.exe).
          suffix="${{ matrix.executable_suffix }}"
          asset="lazyverilog-lsp-${{ inputs.version }}-${{ matrix.platform }}${suffix}"
          binary="build/lazyverilog-lsp${suffix}"
          if [[ ! -f "$binary" && -f "build/Release/lazyverilog-lsp${suffix}" ]]; then
            binary="build/Release/lazyverilog-lsp${suffix}"
          fi
          if [[ ! -f "$binary" ]]; then
            echo "Built binary not found: $binary" >&2
            find build -type f -name "lazyverilog-lsp*" -print >&2
            exit 1
          fi
          cp "$binary" "$asset"

          # MSVC-produced Windows executables cannot be stripped with the Unix
          # strip tool available in Git Bash.  Linux/macOS release binaries keep
          # the existing strip behavior.
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            strip "$asset"
          fi

      - name: Generate checksum
        shell: bash
        run: |
          suffix="${{ matrix.executable_suffix }}"
          asset="lazyverilog-lsp-${{ inputs.version }}-${{ matrix.platform }}${suffix}"
          python - "$asset" <<'PY'
          import hashlib
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          pathlib.Path(str(path) + ".sha256").write_text(
              f"{digest}  {path.name}\n", encoding="utf-8"
          )
          PY

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazyverilog-release-${{ inputs.version }}-${{ matrix.platform }}
          path: |
            lazyverilog-lsp-${{ inputs.version }}-${{ matrix.platform }}${{ matrix.executable_suffix }}
            lazyverilog-lsp-${{ inputs.version }}-${{ matrix.platform }}${{ matrix.executable_suffix }}.sha256

  publish:
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download built release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lazyverilog-release-${{ inputs.version }}-*
          path: dist-release
          merge-multiple: true

      - name: Update version and checksum lock
        run: |
          python3 - "${{ inputs.version }}" <<'PY'
          import pathlib
          import re
          import sys

          version = sys.argv[1]
          if not re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z][0-9A-Za-z.-]*)?", version):
              raise SystemExit(f"invalid release version: {version}")

          platforms = [
              "linux-x64",
              "linux-arm64",
              "linux-x64-static",
              "linux-arm64-static",
              "darwin-x64",
              "darwin-arm64",
              "windows-x64",
          ]

          release_dir = pathlib.Path("dist-release")
          checksums = {}
          for platform in platforms:
              suffix = ".exe" if platform.startswith("windows-") else ""
              asset = release_dir / f"lazyverilog-lsp-{version}-{platform}{suffix}"
              checksum = release_dir / f"lazyverilog-lsp-{version}-{platform}{suffix}.sha256"
              if not asset.is_file():
                  raise SystemExit(f"missing release artifact: {asset}")
              if not checksum.is_file():
                  raise SystemExit(f"missing checksum artifact: {checksum}")
              digest = checksum.read_text(encoding="utf-8").split()[0].lower()
              if not re.fullmatch(r"[0-9a-f]{64}", digest):
                  raise SystemExit(f"invalid SHA-256 digest in {checksum}: {digest!r}")
              checksums[platform] = digest

          pathlib.Path("lua/lazyverilog/version.lua").write_text(
              f'return "{version}"\n', encoding="utf-8"
          )

          checksum_file = pathlib.Path("lua/lazyverilog/checksums.lua")
          text = checksum_file.read_text(encoding="utf-8")

          entry_lines = [f'\t["{version}"] = {{']
          for platform in platforms:
              entry_lines.append(f'\t\t["{platform}"] = "{checksums[platform]}",')
          entry_lines.append("\t},")
          entry = "\n".join(entry_lines)

          version_re = re.compile(
              r'\t\["' + re.escape(version) + r'"\]\s*=\s*\{.*?\n\t\},\n?',
              re.DOTALL,
          )
          if version_re.search(text):
              text = version_re.sub(entry + "\n", text, count=1)
          else:
              marker = "return {\n"
              if marker not in text:
                  raise SystemExit("checksum lock file does not contain expected 'return {' marker")
              text = text.replace(marker, marker + entry + "\n\n", 1)

          checksum_file.write_text(text, encoding="utf-8")

          # --- Generate vscode/src/version.ts ---
          pathlib.Path("vscode/src/version.ts").write_text(
              f'export const RELEASE_VERSION = "{version}";\n',
              encoding="utf-8",
          )

          # --- Generate vscode/src/checksums.ts ---
          ts_lines = [
              "// SHA-256 checksums keyed by version then platform.",
              "// Updated by CI alongside lua/lazyverilog/checksums.lua.",
              'export const RELEASE_CHECKSUMS: Record<string, Record<string, string>> = {',
          ]
          ts_lines.append(f'  "{version}": {{')
          for platform in platforms:
              if platform in checksums:
                  ts_lines.append(f'    "{platform}": "{checksums[platform]}",')
          ts_lines.append("  },")
          ts_lines.append("};")
          ts_lines.append("")

          pathlib.Path("vscode/src/checksums.ts").write_text(
              "\n".join(ts_lines), encoding="utf-8",
          )

          # VS Code extension manifests use plain SemVer without the leading
          # release-tag "v". Keep package-lock.json in sync so `npm ci` and
          # `vsce package` publish a VSIX whose manifest matches this release.
          vscode_version = version[1:]
          package_json = pathlib.Path("vscode/package.json")
          package_text = package_json.read_text(encoding="utf-8")
          package_text, package_count = re.subn(
              r'("version"\s*:\s*")[^"]+(")',
              lambda m: f'{m.group(1)}{vscode_version}{m.group(2)}',
              package_text,
              count=1,
          )
          if package_count != 1:
              raise SystemExit("failed to update vscode/package.json version")
          package_json.write_text(package_text, encoding="utf-8")

          package_lock = pathlib.Path("vscode/package-lock.json")
          lock_text = package_lock.read_text(encoding="utf-8")
          lock_text, lock_count = re.subn(
              r'("version"\s*:\s*")[^"]+(")',
              lambda m: f'{m.group(1)}{vscode_version}{m.group(2)}',
              lock_text,
              count=2,
          )
          if lock_count != 2:
              raise SystemExit("failed to update vscode/package-lock.json root versions")
          package_lock.write_text(lock_text, encoding="utf-8")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build VS Code extension
        run: |
          cd vscode
          npm ci
          npm run compile
          npx vsce package -o lazyverilog-${{ inputs.version }}.vsix
          mkdir -p ../dist-release
          cp lazyverilog-${{ inputs.version }}.vsix ../dist-release/

      - name: Commit release metadata and create tag
        if: ${{ !inputs.dry_run }}
        run: |
          version="${{ inputs.version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${version}" >/dev/null 2>&1; then
            echo "Tag ${version} already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lua/lazyverilog/version.lua lua/lazyverilog/checksums.lua vscode/src/version.ts vscode/src/checksums.ts vscode/package.json vscode/package-lock.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "Release ${version}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

          git tag -a "${version}" -m "Release ${version}"
          git push origin "refs/tags/${version}"

      - name: Resolve release notes
        id: notes
        run: |
          f="docs/releases/${{ inputs.version }}.md"
          if [[ -f "$f" ]]; then
            echo "body_path=$f" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            dist-release/lazyverilog-lsp-${{ inputs.version }}-*
            dist-release/lazyverilog-${{ inputs.version }}.vsix
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
