name: Release

on:
  push:
    tags:
      - "v[0-9].[0-9].[0-9]*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            platform: linux-x64
          - os: ubuntu-20.04
            platform: linux-arm64
            cross: true
          - os: macos-13
            platform: darwin-x64
          - os: macos-14
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compilation tools (linux-arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure (native)
        if: "!matrix.cross"
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (cross arm64)
        if: matrix.cross
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Rename artifact
        run: |
          cp build/lazyverilog-lsp \
             "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"
