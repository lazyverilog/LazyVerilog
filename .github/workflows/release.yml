name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9].[0-9].[0-9]*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: ubuntu-22.04-arm
            platform: linux-arm64
          - os: ubuntu-22.04
            platform: linux-x64-static
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          - os: ubuntu-22.04-arm
            platform: linux-arm64-static
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          - os: macos-15
            platform: darwin-x64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - os: macos-15
            platform: darwin-arm64
            cmake_extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Strip and rename artifact
        run: |
          cp build/lazyverilog-lsp \
             "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"
          strip "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"

      - name: Resolve release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          f="docs/releases/${{ github.ref_name }}.md"
          if [[ -f "$f" ]]; then
            echo "body_path=$f" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
