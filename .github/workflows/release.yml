name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9].[0-9].[0-9]*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            platform: linux-x64
          - os: ubuntu-22.04-arm
            platform: linux-arm64
          - os: macos-13
            platform: darwin-x64
          - os: macos-15
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin Xcode 15.2 (darwin-x64)
        if: matrix.platform == 'darwin-x64'
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Strip and rename artifact
        run: |
          cp build/lazyverilog-lsp \
             "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"
          strip "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: "lazyverilog-lsp-${{ github.ref_name }}-${{ matrix.platform }}"
